# Git hooks for Auriga (installed via `lefthook install`, run on `bun install`).
pre-commit:
  parallel: true
  jobs:
    - name: biome
      glob: "*.{ts,tsx,js,json}"
      run: bunx biome check --no-errors-on-unmatched {staged_files}
    - name: typecheck
      run: bun run typecheck

commit-msg:
  jobs:
    - name: commitlint
      run: bunx commitlint --edit {1}

pre-push:
  jobs:
    - name: test
      run: bun test packages apps scripts

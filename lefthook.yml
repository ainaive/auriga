# Git hooks for Auriga (installed via `lefthook install`, run on `bun install`).
pre-commit:
  parallel: true
  jobs:
    - name: biome
      glob: "*.{ts,tsx,js,json}"
      run: bunx biome check --no-errors-on-unmatched {staged_files}
    - name: typecheck
      run: bun run typecheck

commit-msg:
  jobs:
    - name: commitlint
      run: bunx commitlint --edit {1}

pre-push:
  jobs:
    # The Bun gate (hermetic). apps/console has its own Vitest runner + CI job, so
    # it is scoped out here (its tests use the Vitest API, not bun:test).
    - name: test
      run: bun test packages apps/api scripts

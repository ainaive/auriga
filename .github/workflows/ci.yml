name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.12
      - run: bun install --frozen-lockfile
      - run: bun run check

  # Exercises the prod-only paths (Docker sandbox + Postgres store/audit/queue)
  # that the default hermetic gate can't: a postgres service + Docker on the runner.
  integration:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: auriga
          POSTGRES_PASSWORD: auriga
          POSTGRES_DB: auriga
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U auriga -d auriga"
          --health-interval 5s --health-timeout 5s --health-retries 10
    env:
      DATABASE_URL: postgres://auriga:auriga@localhost:5432/auriga
      AURIGA_DOCKER_TESTS: "1"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.12
      - run: bun install --frozen-lockfile
      # Live Docker sandbox + Postgres store/audit/graphile integration tests.
      - run: bun test packages/habenae packages/sandbox
